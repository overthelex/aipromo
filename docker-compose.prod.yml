services:
  postgres:
    image: postgres:16-alpine
    container_name: aipromo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aipromo
      POSTGRES_USER: aipromo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - aipromo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aipromo"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: aipromo-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env.prod
    environment:
      DATABASE_URL: postgres://aipromo:${POSTGRES_PASSWORD}@postgres:5432/aipromo
    ports:
      - "127.0.0.1:3000:3000"

  caddy:
    image: caddy:2-alpine
    container_name: aipromo-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  aipromo_pgdata:
  caddy_data:
  caddy_config:
