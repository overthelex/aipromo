name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: infra-tempo-488211-h0
  REGION: europe-west1
  SERVICE: aipromo
  REGISTRY: europe-west1-docker.pkg.dev/infra-tempo-488211-h0/aipromo/aipromo

jobs:
  test:
    name: Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

  build-deploy:
    name: Build & Deploy
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Auth Docker to Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: docker build --platform linux/amd64 -t ${{ env.REGISTRY }}:${{ github.sha }} -t ${{ env.REGISTRY }}:latest .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.REGISTRY }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --project=${{ env.PROJECT_ID }}
