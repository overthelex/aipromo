name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  EC2_HOST: 63.180.21.221
  EC2_USER: ubuntu
  REMOTE_DIR: /home/ubuntu/aipromo

jobs:
  test:
    name: Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy to EC2
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Sync files to EC2
        run: |
          rsync -avz --delete \
            --exclude node_modules \
            --exclude .git \
            --exclude data \
            --exclude .env \
            --exclude .env.prod \
            --exclude .env.test \
            --exclude .env.cloudflare \
            --exclude .claude \
            --exclude logos \
            -e "ssh -i ~/.ssh/aipromo-deploy -o StrictHostKeyChecking=no" \
            ./ ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:${{ env.REMOTE_DIR }}/

      - name: Build and restart containers
        run: |
          ssh -i ~/.ssh/aipromo-deploy -o StrictHostKeyChecking=no ${{ env.EC2_USER }}@${{ env.EC2_HOST }} \
            "cd ${{ env.REMOTE_DIR }} && docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build"
