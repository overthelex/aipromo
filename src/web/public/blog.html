<h2>Design Principles</h2>
<p>selected.ai is a monolith — intentionally. When you're building a campaign engine that needs to coordinate search, AI generation, rate limiting, and message delivery in sequence, microservices would add latency and complexity without benefit. One process, one deployment, one database.</p>

<h2>The Stack</h2>
<pre><code>Runtime:     Node.js 20 + TypeScript (ESM)
Web:         Express 5 + ws (WebSocket)
Database:    PostgreSQL via postgres.js
AI:          Claude via AWS Bedrock
LinkedIn:    Unipile API (proxy)
Auth:        JWT cookies + bcrypt
Deploy:      Docker → GCP Artifact Registry → Cloud Run
CI/CD:       GitHub Actions (test → build → deploy)</code></pre>

<h2>Server Architecture</h2>
<p>The Express server serves three concerns from a single process:</p>
<ul>
  <li><strong>REST API</strong> (<code>/api/*</code>) — Dashboard operations, campaign control, analytics</li>
  <li><strong>WebSocket</strong> (<code>/ws</code>) — Real-time campaign logs, status updates</li>
  <li><strong>Static SPA</strong> — Vanilla JS dashboard served from <code>/public</code></li>

<h3>WebSocket Broadcasting</h3>
<p>When a campaign runs, every action (message sent, lead found, error) broadcasts to all connected dashboard clients via WebSocket:</p>
<pre><code>function broadcast(event: string, data: any) {
  const msg = JSON.stringify({ event, data });
  wss.clients.forEach(client => {
    if (client.readyState === WebSocket.OPEN)
      client.send(msg);
  });
}</code></pre>
<p>This gives operators real-time visibility into campaign execution without polling.</p>

<h2>Campaign Engine Flow</h2>
<p>The campaign runs as a background async task triggered by a POST to <code>/api/campaign/run</code>. The HTTP response returns immediately with <code>{"status":"running"}</code>, and the actual work happens after:</p>
<pre><code>apiRouter.post("/campaign/run", async (req, res) => {
  res.json({ status: "running" }); // Return immediately

  const result = await runCampaignDay({
    accountAlias: account,

<ul>

<p>The rate limiter uses a simple sliding-window counter stored in memory, with daily totals persisted to PostgreSQL:</p>
<pre><code>const canSend = await checkAndIncrementDaily(

);</code></pre>

<h2>Database Schema Highlights</h2>

<p>We chose Claude for message generation because of its strong multilingual capabilities (critical for Ukrainian/English mixed audiences) and its ability to follow complex system prompts precisely. AWS Bedrock gives us a managed endpoint without API key management headaches — it integrates natively with IAM roles on Cloud Run.</p>

<h2>The Prompt Architecture</h2>
<p>Every outreach message is generated with a two-part prompt:</p>
<h3>System Prompt</h3>
<p>Contains the product context (~500 words about the product, pricing, features), the specific message angle, and strict formatting rules:</p>
<pre><code>CRITICAL RULES:

- DO NOT start with generic "Привіт, [name]"
- Focus on ONE angle, not a feature list
- End with a soft CTA
- Output ONLY the message text</code></pre>

<h3>User Prompt</h3>
<p>Contains the lead's structured profile data:</p>
<pre><code>Lead profile:
- Name: Олексій Петренко
- Headline: Managing Partner at Kyiv Law Group
- Company: Kyiv Law Group
- Location: Kyiv

Message angle: pain_point_time
Day of campaign: 3</code></pre>

<h2>The 290-Character Regeneration Problem</h2>
<p>This was our biggest production surprise. LinkedIn connection request notes are limited to 290 characters, but Claude generates 400-600 character messages. Our first approach was naive truncation:</p>
<pre><code>// DON'T DO THIS
const note = message.slice(0, 290);</code></pre>
<p>This produced messages that cut off mid-sentence — a terrible first impression. The fix: <strong>regenerate</strong> with an explicit character limit:</p>
<pre><code>const shortPrompt = getOutreachSystemPrompt(angle, 290);

// "HARD LIMIT: message MUST be under 290 characters total"

  shortPrompt, userPrompt
);</code></pre>
<p>As a safety net, if Claude still exceeds the limit (rare but possible), we trim at the last sentence boundary rather than mid-word.</p>

<h2>Timezone-Aware Scheduling</h2>
<p>We map LinkedIn location strings to UTC offsets using pattern matching:</p>
<pre><code>const TIMEZONE_MAP = [
  { patterns: /kyiv|odessa|ukraine/i, utcOffset: 3 },
  { patterns: /london|uk|britain/i, utcOffset: 1 },
  { patterns: /new york|us east/i, utcOffset: -4 },

];</code></pre>

<ul>

    content: `
<h2>The Stakes</h2>
<p>LinkedIn restricts or bans accounts that exhibit automated behavior. Losing an account means losing all connections, conversation history, and trust built over years. Our rate limiting isn't an optimization — it's a survival mechanism.</p>

<h2>Layer 1: Daily Caps</h2>
<p>Hard limits per account per calendar day:</p>
<ul>
  <li><strong>50 messages/day</strong> — Direct messages and connection request notes combined</li>
  <li><strong>20 invitations/day</strong> — Connection requests specifically (LinkedIn watches these closely)</li>
</ul>
<p>These are tracked in the <code>daily_activity</code> table with a composite key of <code>(account_id, date, action_type)</code>. Before each send, the engine calls <code>checkAndIncrementDaily()</code>:</p>
<pre><code>const canSend = await checkAndIncrementDaily(
  accountId, "message", config.maxMessagesPerDay
);
if (!canSend) {
  clog("Daily limit reached. Stopping outreach.");
  break;
}</code></pre>

<h2>Layer 2: Per-Minute Throttle</h2>
<p>Even within daily limits, sending 50 messages in 5 minutes is a red flag. We enforce a sliding window of <strong>5 messages per minute</strong> per account. When the limit is hit, the engine pauses for 30 seconds before continuing.</p>

<h2>Layer 3: Random Delays</h2>
<p>Between each message send, the engine waits for a <strong>random delay of 10–25 seconds</strong>. This mimics human browsing patterns — no human types and sends a message in under a second, then immediately starts the next one.</p>
<pre><code>await sleep(randomDelay(10, 25));
// randomDelay returns ms: (min + Math.random() * (max - min)) * 1000</code></pre>

<h2>Layer 4: Business Hours</h2>
<p>Messages are only sent during business hours (9 AM – 6 PM) in the recipient's timezone. This isn't just for engagement — it's also a naturalness signal. Real professionals don't send LinkedIn messages at 3 AM.</p>

<h2>Layer 5: Invitation Fallback with Retry</h2>
<p>When a direct message fails (lead is unreachable), we fall back to a connection request with a note. This fallback has its own retry logic (max 2 attempts with a 5-second gap) and separately tracks against the invitation daily cap.</p>

<h2>Monitoring</h2>
<p>The dashboard's analytics page shows daily send counts, failure rates, and rate limit hits. If you see a spike in failures or the daily cap being reached too early, it's time to reduce the campaign's <code>maxMessages</code> parameter or spread sends across more hours.</p>

<h2>Configuration</h2>
<p>All limits are configurable via environment variables:</p>
<pre><code>MAX_MESSAGES_PER_DAY=50
MAX_INVITATIONS_PER_DAY=20
MIN_DELAY_SECONDS=10
MAX_DELAY_SECONDS=25
BUSINESS_HOURS_START=9
BUSINESS_HOURS_END=18</code></pre>
<p>Conservative defaults that can be loosened as you build trust with an account — but we recommend keeping them tight for the first 2 weeks.</p>

<h2>The Problem with Polling</h2>
<p>Campaign runs can take 20–30 minutes (60 leads × 15-second delays). If the dashboard polls <code>GET /api/campaign/status</code> every 5 seconds, that's 360 unnecessary HTTP requests per campaign run. Worse, you get status updates in 5-second chunks instead of real-time.</p>

<h2>WebSocket Architecture</h2>
<p>The Express server creates a WebSocket server alongside the HTTP server, sharing the same port:</p>
<pre><code>const server = createServer(app);
const wss = new WebSocketServer({ server, path: "/ws" });</code></pre>
<p>The dashboard opens a WebSocket connection on page load and listens for events. The server broadcasts to all connected clients through a simple helper:</p>
<pre><code>function broadcast(event, data) {
  const msg = JSON.stringify({ event, data });
  wss.clients.forEach(client => {
    if (client.readyState === WebSocket.OPEN)
      client.send(msg);
  });
}</code></pre>

<h2>Event Types</h2>
<p>The campaign engine emits events throughout execution:</p>
<ul>
  <li><code>campaign_log</code> — Every status message: "Searching new leads...", "✓ Олексій Левчук [pain_point_time]", "Daily limit reached"</li>
  <li><code>campaign_done</code> — Final summary with counts: searched, messaged, scheduled, replied, follow-ups</li>
  <li><code>sync_log</code> — Conversation/message sync progress</li>
</ul>

<h2>Dashboard Integration</h2>
<p>The vanilla JS dashboard maintains a WebSocket connection with auto-reconnect:</p>
<pre><code>function connectWS() {
  const ws = new WebSocket(
    location.protocol === "https:" ? "wss://" : "ws://"
    + location.host + "/ws"
  );
  ws.onmessage = (e) => {
    const { event, data } = JSON.parse(e.data);
    handleEvent(event, data);
  };
  ws.onclose = () => setTimeout(connectWS, 3000);
}</code></pre>
<p>Campaign logs appear as they happen — you see each lead being processed, each message being generated and sent, in real time.</p>

<h2>Cloud Run Compatibility</h2>
<p>Cloud Run supports WebSocket connections, but with a caveat: connections are terminated when the container scales to zero. With <code>maxScale: 1</code>, we maintain a single persistent instance, so WebSocket connections survive between requests. The dashboard's auto-reconnect handles any brief disconnections during deployments.</p>

<h2>Why Not SSE?</h2>
<p>Server-Sent Events would work for one-way streaming, but WebSocket gives us bidirectional communication for future features (live campaign control, pause/resume from dashboard). The implementation cost is nearly identical with the <code>ws</code> library.</p>

<h2>The LinkedIn API Problem</h2>
<p>LinkedIn's official API is limited to company pages and marketing tools. There's no public API for sending messages, reading conversations, or searching by profile attributes. Every automation tool uses some form of unofficial access — browser extensions, headless browsers, or third-party proxies.</p>
<p>We chose <strong>Unipile</strong> — a managed API that proxies LinkedIn operations through authenticated accounts. It provides REST endpoints for search, messaging, chat history, and connection requests.</p>

<h2>The Unipile Service</h2>
<p>Our <code>UnipileService</code> class wraps the Unipile API with typed methods:</p>
<pre><code>class UnipileService {
  async searchPeople(keywords, location, title, limit)
  async startChat(linkedinId, message)
  async sendMessage(chatId, message)
  async sendInvitation(linkedinId, note)
  async getChats(limit, cursor)
  async getChatMessages(chatId)
}</code></pre>
<p>Each method includes retry logic with exponential backoff for transient failures (429s, 500s).</p>

<h2>Multi-Account Support</h2>
<p>The system supports multiple LinkedIn accounts configured via <code>UNIPILE_ACCOUNTS</code>:</p>
<pre><code>[
  {"alias":"ihor","id":"hYhcYj2_R2Kp","name":"Ihor Kyrychenko"},
  {"alias":"vladimir","id":"H4VkNF35Qn2c","name":"Vladimir Ovcharov"}
]</code></pre>
<p>Each campaign run targets a specific account. The alias is used throughout the CLI and API for readability, mapped to the Unipile account ID internally.</p>

<h2>Lead Search and Deduplication</h2>
<p>Search results come back as LinkedIn profiles with basic info (name, headline, profile URL, LinkedIn ID). Before saving to the <code>leads</code> table, we deduplicate on <code>(account_id, linkedin_id)</code>:</p>
<pre><code>INSERT INTO leads (account_id, linkedin_id, name, headline, ...)
VALUES ($1, $2, $3, $4, ...)
ON CONFLICT (account_id, linkedin_id) DO NOTHING</code></pre>
<p>This means re-running searches with the same keywords never creates duplicate leads.</p>

<h2>Conversation Sync</h2>
<p>The sync process pulls conversations and messages from Unipile into PostgreSQL:</p>
<ol>
  <li>Fetch all chats via <code>getChats()</code> with pagination</li>
  <li>For each chat, upsert into <code>conversations</code> table</li>
  <li>Fetch messages via <code>getChatMessages(chatId)</code></li>
  <li>Insert new messages (deduplicated by <code>message_id</code>)</li>
  <li>Link conversations to leads via <code>attendee_provider_id</code> matching</li>

<h2>Lead Status Pipeline</h2>
<p>Leads move through a status pipeline tracked in the <code>leads.status</code> field:</p>
<pre><code>prospect → contacted → responded → interested → demo → customer

<p>Transitions are triggered automatically:</p>
<ul>
  <li><strong>prospect → contacted:</strong> When outreach message is sent</li>
  <li><strong>contacted → responded:</strong> When reply is detected during campaign Phase 3</li>
  <li>Subsequent transitions (interested, demo, customer) are manual — set via the dashboard's lead detail view</li>

<p>This means new replies appear in the dashboard within seconds — without waiting for the next sync cycle.</p>

  for (let i = 0; i < 300; i++) { const nx = Math.sin(a*y)-Math.cos(b*x); const ny = Math.sin(c*x)-Math.cos(d*y); x=nx; y=ny; }
  for (let i = 0; i < N; i++) {
    const nx = Math.sin(a*y)-Math.cos(b*x), ny = Math.sin(c*x)-Math.cos(d*y);
    x=nx; y=ny;
    const px = Math.floor((x/zoom + 2.2) / 4.4 * w);
    const py = Math.floor((y/zoom + 2.2) / 4.4 * h);
    if (px>=0 && px<w && py>=0 && py<h) { counts[py*w+px]++; if(counts[py*w+px]>maxC) maxC=counts[py*w+px]; }
  }
  const img = ctx.createImageData(w, h);
  const bgC = hexToRgb(bg);
  for (let i = 0; i < w*h; i++) {
    const t = maxC > 0 ? Math.pow(counts[i]/maxC, 0.45) : 0;
    const [r,g,b] = t > 0.01 ? sampleGradient(rgbs, (t + colorShift) % 1) : bgC;
    const a2 = t > 0.01 ? 0.3 + t * 0.7 : 1;
    img.data[i*4]   = Math.round(bgC[0]*(1-a2) + r*a2);
    img.data[i*4+1] = Math.round(bgC[1]*(1-a2) + g*a2);
    img.data[i*4+2] = Math.round(bgC[2]*(1-a2) + b*a2);
    img.data[i*4+3] = 255;
  }
  ctx.putImageData(img, 0, 0);
}

// Type 2: Harmonograph — damped Lissajous parametric curves
function drawHarmonograph(ctx, w, h, rgbs, bg, anim, palIdx) {
  ctx.fillStyle = bg; ctx.fillRect(0, 0, w, h);
  const hSets = [
    [2.01, 3.03, 2.99, 2.01, 0, 1.57, 3.14, 0.78],
    [3.01, 2.02, 4.00, 3.01, 0.5, 2.1, 1.0, 3.5],
  ];
  const hs = hSets[(palIdx || 0) % hSets.length];
  const f1 = hs[0], f2 = hs[1], f3 = hs[2], f4 = hs[3];
  const p1 = hs[4], p2 = hs[5], p3 = hs[6], p4 = hs[7];
  const d1 = 0.004, d2 = 0.003;
  const phaseShift = anim * 1.5;
  const scaleAnim = 0.23 + anim * 0.04;
  const N = 100000;
  ctx.lineWidth = 0.6;
  ctx.beginPath();
  for (let i = 0; i < N; i++) {
    const t = i * 0.004;
    const x = Math.sin(t*f1 + p1 + phaseShift)*Math.exp(-d1*t) + Math.sin(t*f3 + p3)*Math.exp(-d2*t);
    const y = Math.sin(t*f2 + p2 + phaseShift*0.7)*Math.exp(-d1*t) + Math.sin(t*f4 + p4)*Math.exp(-d2*t);
    const px = w/2 + x * w * scaleAnim;
    const py = h/2 + y * h * scaleAnim * 1.4;
    const ct = (i / N + anim * 0.3) % 1;
    const [r,g,b] = sampleGradient(rgbs, ct);
    ctx.strokeStyle = `rgba(${r},${g},${b},0.18)`;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    if (i % 3000 === 0 && i > 0) { ctx.stroke(); ctx.beginPath(); ctx.moveTo(px, py); }
  }
  ctx.stroke();
}

// Type 3: Flow field — sine-cos vector field with particle traces
function drawFlowField(ctx, w, h, rgbs, bg, anim, palIdx) {
  ctx.fillStyle = bg; ctx.fillRect(0, 0, w, h);
  const fSets = [[137, 42, 0.008], [305, 190, 0.006], [78, 260, 0.011]];
  const fs = fSets[(palIdx || 0) % fSets.length];
  const scaleF = fs[2] + anim * 0.003;
  const ox = fs[0] + anim * 80, oy = fs[1] + anim * 50;
  const particles = 800;
  const steps = 250;
  const lineW = 0.8 + anim * 0.6;
  ctx.lineWidth = lineW;
  const rng = seeded(42);
  for (let p = 0; p < particles; p++) {
    let x = rng() * w, y = rng() * h;
    const ct = (p / particles + anim * 0.25) % 1;
    const [r,g,b] = sampleGradient(rgbs, ct);
    ctx.strokeStyle = `rgba(${r},${g},${b},0.14)`;
    ctx.beginPath(); ctx.moveTo(x, y);
    for (let s = 0; s < steps; s++) {
      const angle = Math.sin((x+ox)*scaleF)*Math.cos((y+oy)*scaleF)*Math.PI*4
                  + Math.cos((x-y)*scaleF*0.5)*Math.PI*2;
      x += Math.cos(angle) * 1.8; y += Math.sin(angle) * 1.8;
      if (x<0||x>w||y<0||y>h) break;
      ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
}

// Each article: unique type + palette
const ARTICLE_VISUALS = {
  "linkedin-outreach-automation":    { type: "clifford",     palette: 0 },
  "hyperpersonalization-conversion": { type: "dejong",       palette: 1 },
  "architecture-nodejs-cloudrun":    { type: "harmonograph", palette: 2 },
  "claude-ai-linkedin-integration":  { type: "flowfield",    palette: 3 },
  "follow-up-sequence-ai":          { type: "dejong",       palette: 4 },
  "timezone-aware-outreach":        { type: "flowfield",    palette: 5 },
  "seven-message-angles":           { type: "clifford",     palette: 6 },
  "rate-limiting-linkedin":         { type: "harmonograph", palette: 7 },
  "websocket-realtime-monitoring":  { type: "clifford",     palette: 8 },
  "unipile-linkedin-data-pipeline": { type: "dejong",       palette: 9 },
};

const DRAW_FNS = {
  clifford: drawClifford,
  dejong: drawDeJong,
  harmonograph: drawHarmonograph,
  flowfield: drawFlowField,
};

// ─── Shared overlays ────────────────────────────────────────────────────────────

function drawOverlays(ctx, w, h) {
  const vig = ctx.createRadialGradient(w/2, h/2, h*0.2, w/2, h/2, w*0.7);
  vig.addColorStop(0, "rgba(0,0,0,0)");
  vig.addColorStop(0.7, "rgba(0,0,0,0.12)");
  vig.addColorStop(1, "rgba(0,0,0,0.5)");
  ctx.fillStyle = vig; ctx.fillRect(0, 0, w, h);
  const bf = ctx.createLinearGradient(0, h*0.45, 0, h);
  bf.addColorStop(0, "transparent");
  bf.addColorStop(1, "rgba(30,30,36,0.85)");
  ctx.fillStyle = bf; ctx.fillRect(0, 0, w, h);
}

// ─── Banner rendering & cache ───────────────────────────────────────────────────

function drawFullBanner(ctx, w, h, articleId, anim) {
  const vis = ARTICLE_VISUALS[articleId] || { type: "clifford", palette: 0 };
  const palette = PALETTES[vis.palette];
  const rgbs = palette.colors.map(hexToRgb);
  DRAW_FNS[vis.type](ctx, w, h, rgbs, palette.bg, anim, vis.palette);
  drawOverlays(ctx, w, h);
}

function drawBannerText(ctx, w, h, title, category, isLarge) {
  const s = w / (isLarge ? 720 : 430); // scale factor
  ctx.save();

  // Category badge — top left
  const badgeText = category === "marketing" ? "GROWTH & MARKETING" : "ENGINEERING";
  const badgeFontSz = Math.round(11 * s);
  ctx.font = `700 ${badgeFontSz}px 'DM Sans', sans-serif`;
  ctx.letterSpacing = `${0.8 * s}px`;
  const bm = ctx.measureText(badgeText);
  const bPad = 10 * s, bH = badgeFontSz + 10 * s, bX = 20 * s, bY = 18 * s;
  ctx.fillStyle = category === "marketing" ? "rgba(160,112,240,0.9)" : "rgba(48,200,176,0.9)";
  ctx.beginPath(); ctx.roundRect(bX, bY, bm.width + bPad * 2, bH, 4 * s); ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.fillText(badgeText, bX + bPad, bY + badgeFontSz + 2 * s);
  ctx.letterSpacing = "0px";

  // Title — large uppercase, bottom of banner
  const titleText = title.toUpperCase();
  const titleFontSz = Math.round((isLarge ? 32 : 22) * s);
  ctx.font = `800 ${titleFontSz}px 'DM Sans', sans-serif`;
  ctx.fillStyle = "#fff";
  ctx.shadowColor = "rgba(0,0,0,0.8)";
  ctx.shadowBlur = 12 * s;
  ctx.shadowOffsetY = 3 * s;

  // Word-wrap
  const pad = 20 * s;
  const maxW = w - pad * 2;
  const words = titleText.split(" ");
  const lines = [];
  let line = "";
  for (const word of words) {
    const test = line ? line + " " + word : word;
    if (ctx.measureText(test).width > maxW) { if (line) lines.push(line); line = word; }
    else line = test;
  }
  if (line) lines.push(line);

  const lineH = titleFontSz * 1.18;
  const blockH = lines.length * lineH;
  const startY = h - pad - blockH + titleFontSz;
  lines.forEach((l, i) => ctx.fillText(l, pad, startY + i * lineH));

  ctx.restore();
}

function initCanvas(canvas) {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const rect = canvas.getBoundingClientRect();
  const w = Math.floor(rect.width * dpr), h = Math.floor(rect.height * dpr);
  canvas.width = w; canvas.height = h;
  return { ctx: canvas.getContext("2d"), w, h };
}

function renderBanner(canvas, articleId) {
  const { ctx, w, h } = initCanvas(canvas);
  const article = ARTICLES.find(a => a.id === articleId);
  drawFullBanner(ctx, w, h, articleId, 0);
  if (article) drawBannerText(ctx, w, h, article.title, article.category, false);
}

function renderBannerLarge(canvas, articleId) {
  const { ctx, w, h } = initCanvas(canvas);
  const article = ARTICLES.find(a => a.id === articleId);
  drawFullBanner(ctx, w, h, articleId, 0);
  if (article) drawBannerText(ctx, w, h, article.title, article.category, true);
}

// Hover animation — zoom + color shift + parameter morph (no rotation)
const activeAnims = new Map();

function animateBanner(canvas, articleId, isLarge) {
  if (activeAnims.has(articleId)) return;
  const w = canvas.width, h = canvas.height;
  const ctx = canvas.getContext("2d");
  const article = ARTICLES.find(a => a.id === articleId);

  const duration = 2500;
  const start = performance.now();

  function tick(now) {
    const progress = Math.min((now - start) / duration, 1);
    const ease = progress < 0.5 ? 4 * progress ** 3 : 1 - (-2 * progress + 2) ** 3 / 2;
    const anim = Math.sin(ease * Math.PI); // 0 → 1 → 0

    drawFullBanner(ctx, w, h, articleId, anim);
    if (article) drawBannerText(ctx, w, h, article.title, article.category, isLarge);

    if (progress < 1) {
      activeAnims.set(articleId, requestAnimationFrame(tick));
    } else {
      activeAnims.delete(articleId);
      drawFullBanner(ctx, w, h, articleId, 0);
      if (article) drawBannerText(ctx, w, h, article.title, article.category, isLarge);
    }
  }
  activeAnims.set(articleId, requestAnimationFrame(tick));
}

// ─── Rendering ──────────────────────────────────────────────────────────────────

function renderCards(filter) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  const filtered = filter === "all" ? ARTICLES : ARTICLES.filter(a => a.category === filter);

  filtered.forEach(a => {
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.category = a.category;
    card.onclick = () => openArticle(a.id);
    card.innerHTML = `
      <div class="card-banner" data-article="${a.id}">
        <canvas></canvas>
      </div>
      <div class="card-body">
        <div class="meta"><span>${a.readTime} read</span><span>${a.date}</span></div>
        <p class="excerpt">${a.excerpt}</p>
      </div>
      <div class="card-tags">${a.tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>
    `;
    grid.appendChild(card);

    // Lazy render with IntersectionObserver
    const banner = card.querySelector(".card-banner");
    const canvas = banner.querySelector("canvas");
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { renderBanner(canvas, a.id); obs.disconnect(); }
    }, { rootMargin: "200px" });
    obs.observe(canvas);

    // Hover animation
    banner.addEventListener("mouseenter", () => animateBanner(canvas, a.id, false));
  });
}

function filterCards(filter) {
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.toggle("active", b.textContent.includes(
    filter === "all" ? "All" : filter === "marketing" ? "Growth" : "Engineering"
  )));
  renderCards(filter);
}

function openArticle(id) {
  const a = ARTICLES.find(x => x.id === id);
  if (!a) return;
  const modal = document.getElementById("modal");
  modal.innerHTML = `
    <div class="modal-banner">
      <canvas></canvas>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-content">
      <div class="article-meta">
        <span style="font-size:12px;color:var(--text3)">${a.readTime} read &middot; ${a.date}</span>
      </div>
      <div class="article-body">${a.content}</div>
    </div>
    <div class="modal-tags">${a.tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>
  `;
  document.getElementById("modal-backdrop").classList.add("open");
  document.body.style.overflow = "hidden";

  requestAnimationFrame(() => {
    const canvas = modal.querySelector("canvas");
    renderBannerLarge(canvas, a.id);
    setTimeout(() => animateBanner(canvas, a.id, true), 100);
  });

  // Update URL
  history.pushState(null, "", `/blog?article=${id}`);
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById("modal-backdrop").classList.remove("open");
  document.body.style.overflow = "";
  history.pushState(null, "", "/blog");
}

document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

// ─── Init ───────────────────────────────────────────────────────────────────────

renderCards("all");

// Open article from URL
const params = new URLSearchParams(location.search);
if (params.get("article")) openArticle(params.get("article"));
</script>
