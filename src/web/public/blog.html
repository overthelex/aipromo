    :root {
      --bg: #101014; --surface: #1e1e24; --border: #2e2e38;

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    a { color: var(--amber); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Header */
    .header {
      border-bottom: 1px solid var(--border); padding: 16px 32px;

    .header .logo { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 18px; color: var(--amber); }
    .header .sep { width: 1px; height: 20px; background: var(--border); }
    .header .nav-link { font-size: 13px; color: var(--text3); font-weight: 500; transition: color 0.15s; }
    .header .nav-link:hover { color: var(--text); text-decoration: none; }

    }
    .filter-btn {
      padding: 6px 16px; font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif;
      background: transparent; border: 1px solid var(--border); border-radius: 20px;

    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }

    .card {

    .card-body .meta { font-size: 11px; color: var(--text3); margin-bottom: 10px; display: flex; gap: 12px; }
    .card-body .excerpt { font-size: 13px; color: var(--text2); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .card-tags { padding: 0 20px 16px; display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 3px;
      background: rgba(240,168,48,0.1); color: var(--amber); letter-spacing: 0.3px;
    }

    /* Article modal */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
      z-index: 200; display: none; align-items: flex-start; justify-content: center;
      overflow-y: auto; padding: 40px 20px;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      max-width: 720px; width: 100%; overflow: hidden; position: relative;

    .modal-banner { height: 260px; position: relative; }

    .modal-close {

    .modal-content .article-body blockquote {

<script>
// ─── Articles ───────────────────────────────────────────────────────────────────

let ARTICLES = [];


// ─── Mathematical Banner Generators ─────────────────────────────────────────────
// 2D iterative maps with density accumulation + hover animation

function hashSeed(str) {
  let h = 0x811c9dc5;
  for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = (h * 0x01000193) >>> 0; }
  return h;
}

function seeded(seed) {
  return () => { seed |= 0; seed = (seed + 0x6d2b79f5) | 0; let t = Math.imul(seed ^ (seed >>> 15), 1 | seed); t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t; return ((t ^ (t >>> 14)) >>> 0) / 4294967296; };
}

const PALETTES = [
  { bg: "#12041f", colors: ["#12041f","#2d1b69","#6b2fa8","#a040d0","#d050e0","#f06292","#ff8a80","#ffc107","#ffe082"] },
  { bg: "#041a2a", colors: ["#041a2a","#0c3555","#1565c0","#2196f3","#4fc3f7","#80deea","#a7ffeb","#1de9b6","#b2ff59"] },
  { bg: "#1a0800", colors: ["#1a0800","#5d1a00","#bf360c","#ff6d00","#ff9100","#ffab40","#ffd54f","#fff176","#ffffff"] },
  { bg: "#050520", colors: ["#050520","#1a237e","#283593","#3f51b5","#7986cb","#9fa8da","#e8eaf6","#b388ff","#ea80fc"] },
  { bg: "#0a1a10", colors: ["#0a1a10","#1b5e20","#2e7d32","#43a047","#66bb6a","#81c784","#a5d6a7","#c8e6c9","#e8f5e9"] },
  { bg: "#1a1520", colors: ["#1a1520","#4a148c","#6a1b9a","#8e24aa","#ab47bc","#ce93d8","#e1bee7","#f3e5f5","#ff80ab"] },
  { bg: "#1a1005", colors: ["#1a1005","#4e342e","#6d4c41","#8d6e63","#a1887f","#d7ccc8","#efebe9","#ff8f00","#ffc107"] },
  { bg: "#051a1a", colors: ["#051a1a","#004d40","#00695c","#00897b","#26a69a","#4db6ac","#80cbc4","#b2dfdb","#e0f2f1"] },
  { bg: "#150515", colors: ["#150515","#880e4f","#ad1457","#c2185b","#e91e63","#f06292","#f48fb1","#f8bbd0","#fce4ec"] },
  { bg: "#10100a", colors: ["#10100a","#827717","#9e9d24","#afb42b","#c0ca33","#cddc39","#d4e157","#e6ee9c","#f0f4c3"] },
];

function hexToRgb(hex) { const n = parseInt(hex.slice(1), 16); return [(n>>16)&255, (n>>8)&255, n&255]; }

function sampleGradient(rgbs, t) {
  const ct = Math.max(0, Math.min(0.999, t));
  const seg = ct * (rgbs.length - 1);
  const i = Math.floor(seg), f = seg - i;
  const c1 = rgbs[i], c2 = rgbs[Math.min(i+1, rgbs.length-1)];
  return [Math.round(c1[0]+(c2[0]-c1[0])*f), Math.round(c1[1]+(c2[1]-c1[1])*f), Math.round(c1[2]+(c2[2]-c1[2])*f)];
}

// ─── Attractor types (2D iterative maps) ────────────────────────────────────────

// ─── 4 distinct generator types ─────────────────────────────────────────────────

// Type 0: Clifford attractor — density accumulation
// Params vary by palette index for uniqueness when reused
const CLIFFORD_PARAMS = [
  [-1.4, 1.6, 1.0, 0.7],
  [1.7, -1.8, 0.9, -1.2],
  [-1.7, 1.3, -0.5, 1.5],
];
function drawClifford(ctx, w, h, rgbs, bg, anim, palIdx) {
  const zoom = 1.0 + anim * 0.15;
  const colorShift = anim * 0.4;
  const pp = CLIFFORD_PARAMS[(palIdx || 0) % CLIFFORD_PARAMS.length];
  const a = pp[0], b = pp[1], c = pp[2], d = pp[3];
  const N = 250000;
  const counts = new Float32Array(w * h);
  let x = 0.1, y = 0.1, maxC = 0;
  for (let i = 0; i < 300; i++) { const nx = Math.sin(a*y)+c*Math.cos(a*x); const ny = Math.sin(b*x)+d*Math.cos(b*y); x=nx; y=ny; }
  for (let i = 0; i < N; i++) {
    const nx = Math.sin(a*y)+c*Math.cos(a*x), ny = Math.sin(b*x)+d*Math.cos(b*y);
    x=nx; y=ny;
    const px = Math.floor((x/zoom + 2.5) / 5 * w);
    const py = Math.floor((y/zoom + 2.5) / 5 * h);
    if (px>=0 && px<w && py>=0 && py<h) { counts[py*w+px]++; if(counts[py*w+px]>maxC) maxC=counts[py*w+px]; }
  }
  const img = ctx.createImageData(w, h);
  const bgC = hexToRgb(bg);
  for (let i = 0; i < w*h; i++) {
    const t = maxC > 0 ? Math.pow(counts[i]/maxC, 0.4) : 0;
    const [r,g,b] = t > 0.01 ? sampleGradient(rgbs, (t + colorShift) % 1) : bgC;
    const a2 = t > 0.01 ? 0.3 + t * 0.7 : 1;
    img.data[i*4]   = Math.round(bgC[0]*(1-a2) + r*a2);
    img.data[i*4+1] = Math.round(bgC[1]*(1-a2) + g*a2);
    img.data[i*4+2] = Math.round(bgC[2]*(1-a2) + b*a2);
    img.data[i*4+3] = 255;
  }
  ctx.putImageData(img, 0, 0);
}

const DEJONG_PARAMS = [
  [-2.24, 2.43, -1.65, -2.43],
  [1.4, -2.3, 2.4, -2.1],
  [-2.7, -0.09, -0.86, -2.2],
];
function drawDeJong(ctx, w, h, rgbs, bg, anim, palIdx) {
  const zoom = 1.0 + anim * 0.12;
  const colorShift = anim * 0.35;
  const pp = DEJONG_PARAMS[(palIdx || 0) % DEJONG_PARAMS.length];
  const a = pp[0], b = pp[1], c = pp[2], d = pp[3];
  const N = 250000;
  const counts = new Float32Array(w * h);
  let x = 0.1, y = 0.1, maxC = 0;
  for (let i = 0; i < 300; i++) { const nx = Math.sin(a*y)-Math.cos(b*x); const ny = Math.sin(c*x)-Math.cos(d*y); x=nx; y=ny; }
  for (let i = 0; i < N; i++) {
    const nx = Math.sin(a*y)-Math.cos(b*x), ny = Math.sin(c*x)-Math.cos(d*y);
    x=nx; y=ny;
    const px = Math.floor((x/zoom + 2.2) / 4.4 * w);
    const py = Math.floor((y/zoom + 2.2) / 4.4 * h);
    if (px>=0 && px<w && py>=0 && py<h) { counts[py*w+px]++; if(counts[py*w+px]>maxC) maxC=counts[py*w+px]; }
  }
  const img = ctx.createImageData(w, h);
  const bgC = hexToRgb(bg);
  for (let i = 0; i < w*h; i++) {
    const t = maxC > 0 ? Math.pow(counts[i]/maxC, 0.45) : 0;
    const [r,g,b] = t > 0.01 ? sampleGradient(rgbs, (t + colorShift) % 1) : bgC;
    const a2 = t > 0.01 ? 0.3 + t * 0.7 : 1;
    img.data[i*4]   = Math.round(bgC[0]*(1-a2) + r*a2);
    img.data[i*4+1] = Math.round(bgC[1]*(1-a2) + g*a2);
    img.data[i*4+2] = Math.round(bgC[2]*(1-a2) + b*a2);
    img.data[i*4+3] = 255;
  }
  ctx.putImageData(img, 0, 0);
}

// Type 2: Harmonograph — damped Lissajous parametric curves
function drawHarmonograph(ctx, w, h, rgbs, bg, anim, palIdx) {
  ctx.fillStyle = bg; ctx.fillRect(0, 0, w, h);
  const hSets = [
    [2.01, 3.03, 2.99, 2.01, 0, 1.57, 3.14, 0.78],
    [3.01, 2.02, 4.00, 3.01, 0.5, 2.1, 1.0, 3.5],
  ];
  const hs = hSets[(palIdx || 0) % hSets.length];
  const f1 = hs[0], f2 = hs[1], f3 = hs[2], f4 = hs[3];
  const p1 = hs[4], p2 = hs[5], p3 = hs[6], p4 = hs[7];
  const d1 = 0.004, d2 = 0.003;
  const phaseShift = anim * 1.5;
  const scaleAnim = 0.23 + anim * 0.04;
  const N = 100000;
  ctx.lineWidth = 0.6;
  ctx.beginPath();
  for (let i = 0; i < N; i++) {
    const t = i * 0.004;
    const x = Math.sin(t*f1 + p1 + phaseShift)*Math.exp(-d1*t) + Math.sin(t*f3 + p3)*Math.exp(-d2*t);
    const y = Math.sin(t*f2 + p2 + phaseShift*0.7)*Math.exp(-d1*t) + Math.sin(t*f4 + p4)*Math.exp(-d2*t);
    const px = w/2 + x * w * scaleAnim;
    const py = h/2 + y * h * scaleAnim * 1.4;
    const ct = (i / N + anim * 0.3) % 1;
    const [r,g,b] = sampleGradient(rgbs, ct);
    ctx.strokeStyle = `rgba(${r},${g},${b},0.18)`;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    if (i % 3000 === 0 && i > 0) { ctx.stroke(); ctx.beginPath(); ctx.moveTo(px, py); }
  }
  ctx.stroke();
}

// Type 3: Flow field — sine-cos vector field with particle traces
function drawFlowField(ctx, w, h, rgbs, bg, anim, palIdx) {
  ctx.fillStyle = bg; ctx.fillRect(0, 0, w, h);
  const fSets = [[137, 42, 0.008], [305, 190, 0.006], [78, 260, 0.011]];
  const fs = fSets[(palIdx || 0) % fSets.length];
  const scaleF = fs[2] + anim * 0.003;
  const ox = fs[0] + anim * 80, oy = fs[1] + anim * 50;
  const particles = 800;
  const steps = 250;
  const lineW = 0.8 + anim * 0.6;
  ctx.lineWidth = lineW;
  const rng = seeded(42);
  for (let p = 0; p < particles; p++) {
    let x = rng() * w, y = rng() * h;
    const ct = (p / particles + anim * 0.25) % 1;
    const [r,g,b] = sampleGradient(rgbs, ct);
    ctx.strokeStyle = `rgba(${r},${g},${b},0.14)`;
    ctx.beginPath(); ctx.moveTo(x, y);
    for (let s = 0; s < steps; s++) {
      const angle = Math.sin((x+ox)*scaleF)*Math.cos((y+oy)*scaleF)*Math.PI*4
                  + Math.cos((x-y)*scaleF*0.5)*Math.PI*2;
      x += Math.cos(angle) * 1.8; y += Math.sin(angle) * 1.8;
      if (x<0||x>w||y<0||y>h) break;
      ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
}

// Each article: unique type + palette
const ARTICLE_VISUALS = {
  "linkedin-outreach-automation":    { type: "clifford",     palette: 0 },
  "hyperpersonalization-conversion": { type: "dejong",       palette: 1 },
  "architecture-nodejs-cloudrun":    { type: "harmonograph", palette: 2 },
  "claude-ai-linkedin-integration":  { type: "flowfield",    palette: 3 },
  "follow-up-sequence-ai":          { type: "dejong",       palette: 4 },
  "timezone-aware-outreach":        { type: "flowfield",    palette: 5 },
  "seven-message-angles":           { type: "clifford",     palette: 6 },
  "rate-limiting-linkedin":         { type: "harmonograph", palette: 7 },
  "websocket-realtime-monitoring":  { type: "clifford",     palette: 8 },
  "unipile-linkedin-data-pipeline": { type: "dejong",       palette: 9 },
};

const DRAW_FNS = {
  clifford: drawClifford,
  dejong: drawDeJong,
  harmonograph: drawHarmonograph,
  flowfield: drawFlowField,
};

// ─── Shared overlays ────────────────────────────────────────────────────────────

function drawOverlays(ctx, w, h) {
  const vig = ctx.createRadialGradient(w/2, h/2, h*0.2, w/2, h/2, w*0.7);
  vig.addColorStop(0, "rgba(0,0,0,0)");
  vig.addColorStop(0.7, "rgba(0,0,0,0.12)");
  vig.addColorStop(1, "rgba(0,0,0,0.5)");
  ctx.fillStyle = vig; ctx.fillRect(0, 0, w, h);
  const bf = ctx.createLinearGradient(0, h*0.45, 0, h);
  bf.addColorStop(0, "transparent");
  bf.addColorStop(1, "rgba(30,30,36,0.85)");
  ctx.fillStyle = bf; ctx.fillRect(0, 0, w, h);
}

// ─── Banner rendering & cache ───────────────────────────────────────────────────

function drawFullBanner(ctx, w, h, articleId, anim) {
  const vis = ARTICLE_VISUALS[articleId] || { type: "clifford", palette: 0 };
  const palette = PALETTES[vis.palette];
  const rgbs = palette.colors.map(hexToRgb);
  DRAW_FNS[vis.type](ctx, w, h, rgbs, palette.bg, anim, vis.palette);
  drawOverlays(ctx, w, h);
}

function drawBannerText(ctx, w, h, title, category, isLarge) {
  const s = w / (isLarge ? 720 : 430); // scale factor
  ctx.save();

  // Category badge — top left
  const badgeText = category === "marketing" ? t('badgeMarketing') : t('badgeEngineering');
  const badgeFontSz = Math.round(11 * s);
  ctx.font = `700 ${badgeFontSz}px 'DM Sans', sans-serif`;
  ctx.letterSpacing = `${0.8 * s}px`;
  const bm = ctx.measureText(badgeText);
  const bPad = 10 * s, bH = badgeFontSz + 10 * s, bX = 20 * s, bY = 18 * s;
  ctx.fillStyle = category === "marketing" ? "rgba(160,112,240,0.9)" : "rgba(48,200,176,0.9)";
  ctx.beginPath(); ctx.roundRect(bX, bY, bm.width + bPad * 2, bH, 4 * s); ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.fillText(badgeText, bX + bPad, bY + badgeFontSz + 2 * s);
  ctx.letterSpacing = "0px";

  // Title — large uppercase, bottom of banner
  const titleText = title.toUpperCase();
  const titleFontSz = Math.round((isLarge ? 32 : 22) * s);
  ctx.font = `800 ${titleFontSz}px 'DM Sans', sans-serif`;
  ctx.fillStyle = "#fff";
  ctx.shadowColor = "rgba(0,0,0,0.8)";
  ctx.shadowBlur = 12 * s;
  ctx.shadowOffsetY = 3 * s;

  // Word-wrap
  const pad = 20 * s;
  const maxW = w - pad * 2;
  const words = titleText.split(" ");
  const lines = [];
  let line = "";
  for (const word of words) {
    const test = line ? line + " " + word : word;
    if (ctx.measureText(test).width > maxW) { if (line) lines.push(line); line = word; }
    else line = test;
  }
  if (line) lines.push(line);

  const lineH = titleFontSz * 1.18;
  const blockH = lines.length * lineH;
  const startY = h - pad - blockH + titleFontSz;
  lines.forEach((l, i) => ctx.fillText(l, pad, startY + i * lineH));

  ctx.restore();
}

function initCanvas(canvas) {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const rect = canvas.getBoundingClientRect();
  const w = Math.floor(rect.width * dpr), h = Math.floor(rect.height * dpr);
  canvas.width = w; canvas.height = h;
  return { ctx: canvas.getContext("2d"), w, h };
}

function renderBanner(canvas, articleId) {
  const { ctx, w, h } = initCanvas(canvas);
  const article = ARTICLES.find(a => a.id === articleId);
  drawFullBanner(ctx, w, h, articleId, 0);
  if (article) drawBannerText(ctx, w, h, getField(article, 'title'), article.category, false);
}

function renderBannerLarge(canvas, articleId) {
  const { ctx, w, h } = initCanvas(canvas);
  const article = ARTICLES.find(a => a.id === articleId);
  drawFullBanner(ctx, w, h, articleId, 0);
  if (article) drawBannerText(ctx, w, h, getField(article, 'title'), article.category, true);
}

// Hover animation — zoom + color shift + parameter morph (no rotation)
const activeAnims = new Map();

function animateBanner(canvas, articleId, isLarge) {
  if (activeAnims.has(articleId)) return;
  const w = canvas.width, h = canvas.height;
  const ctx = canvas.getContext("2d");
  const article = ARTICLES.find(a => a.id === articleId);

  const duration = 2500;
  const start = performance.now();

  function tick(now) {
    const progress = Math.min((now - start) / duration, 1);
    const ease = progress < 0.5 ? 4 * progress ** 3 : 1 - (-2 * progress + 2) ** 3 / 2;
    const anim = Math.sin(ease * Math.PI); // 0 → 1 → 0

    drawFullBanner(ctx, w, h, articleId, anim);
    if (article) drawBannerText(ctx, w, h, getField(article, 'title'), article.category, isLarge);

    if (progress < 1) {
      activeAnims.set(articleId, requestAnimationFrame(tick));
    } else {
      activeAnims.delete(articleId);
      drawFullBanner(ctx, w, h, articleId, 0);
      if (article) drawBannerText(ctx, w, h, getField(article, 'title'), article.category, isLarge);
    }
  }
  activeAnims.set(articleId, requestAnimationFrame(tick));
}

// ─── i18n ───────────────────────────────────────────────────────────────────────

const UI_STRINGS = {
  en: {
    heroTitle: 'The <span>selected.ai</span> Blog',
    heroSub: 'How we built an AI-powered LinkedIn outreach engine — from architecture to conversion. For growth managers and engineers alike.',
    all: 'All', marketing: 'Growth & Marketing', engineering: 'Engineering',
    read: 'read', signIn: 'Sign In',
    badgeMarketing: 'GROWTH & MARKETING', badgeEngineering: 'ENGINEERING',
  },
  ua: {
    heroTitle: 'Блог <span>selected.ai</span>',
    heroSub: 'Як ми побудували AI-платформу для автоматизації LinkedIn-аутрічу — від архітектури до конверсії. Для маркетологів та інженерів.',
    all: 'Усі', marketing: 'Зростання & Маркетинг', engineering: 'Інженерія',
    read: 'читання', signIn: 'Увійти',
    badgeMarketing: 'ЗРОСТАННЯ & МАРКЕТИНГ', badgeEngineering: 'ІНЖЕНЕРІЯ',
  }
};

let currentLang = localStorage.getItem('blog_lang') || 'ua';

function t(key) { return UI_STRINGS[currentLang][key] || UI_STRINGS.en[key] || key; }

function getField(article, field) {
  if (currentLang === 'ua' && article[field + '_ua']) return article[field + '_ua'];
  return article[field];
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('blog_lang', lang);
  document.getElementById('lang-en').style.background = lang === 'en' ? 'var(--amber)' : 'transparent';
  document.getElementById('lang-en').style.color = lang === 'en' ? 'var(--bg)' : 'var(--text3)';
  document.getElementById('lang-ua').style.background = lang === 'ua' ? 'var(--amber)' : 'transparent';
  document.getElementById('lang-ua').style.color = lang === 'ua' ? 'var(--bg)' : 'var(--text3)';
  document.getElementById('hero-title').innerHTML = t('heroTitle');
  document.getElementById('hero-sub').textContent = t('heroSub');
  document.getElementById('nav-signin').textContent = t('signIn');
  // Update filter buttons
  document.querySelectorAll('.filter-btn').forEach(b => {
    const f = b.dataset.filter;
    if (f) b.textContent = t(f);
  });
  // Re-render cards and close modal
  closeModal();
  renderCards(currentFilter);
}

let currentFilter = 'all';

// ─── Rendering ──────────────────────────────────────────────────────────────────

function renderCards(filter) {
  currentFilter = filter;
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  const filtered = filter === "all" ? ARTICLES : ARTICLES.filter(a => a.category === filter);

  filtered.forEach(a => {
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.category = a.category;
    card.onclick = () => openArticle(a.id);
    card.innerHTML = `
      <div class="card-banner" data-article="${a.id}">
        <canvas></canvas>
      </div>
      <div class="card-body">
        <div class="meta"><span>${a.readTime} ${t('read')}</span><span>${a.date}</span></div>
        <p class="excerpt">${getField(a, 'excerpt')}</p>
      </div>
      <div class="card-tags">${a.tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>
    `;
    grid.appendChild(card);

    // Lazy render with IntersectionObserver
    const banner = card.querySelector(".card-banner");
    const canvas = banner.querySelector("canvas");
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { renderBanner(canvas, a.id); obs.disconnect(); }
    }, { rootMargin: "200px" });
    obs.observe(canvas);

    // Hover animation
    banner.addEventListener("mouseenter", () => animateBanner(canvas, a.id, false));
  });
}

function filterCards(filter) {
  currentFilter = filter;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.toggle("active", b.dataset.filter === filter));
  renderCards(filter);
}

function openArticle(id) {
  const a = ARTICLES.find(x => x.id === id);
  if (!a) return;
  const modal = document.getElementById("modal");
  modal.innerHTML = `
    <div class="modal-banner">
      <canvas></canvas>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-content">
      <div class="article-meta">
        <span style="font-size:12px;color:var(--text3)">${a.readTime} ${t('read')} &middot; ${a.date}</span>
      </div>
      <div class="article-body">${getField(a, 'content')}</div>
    </div>
    <div class="modal-tags">${a.tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>
  `;
  document.getElementById("modal-backdrop").classList.add("open");
  document.body.style.overflow = "hidden";

  requestAnimationFrame(() => {
    const canvas = modal.querySelector("canvas");
    renderBannerLarge(canvas, a.id);
    setTimeout(() => animateBanner(canvas, a.id, true), 100);
  });

  // Update URL
  history.pushState(null, "", `/blog?article=${id}`);
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById("modal-backdrop").classList.remove("open");
  document.body.style.overflow = "";
  history.pushState(null, "", "/blog");
}

document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

// ─── Init ───────────────────────────────────────────────────────────────────────

fetch("/articles.json").then(r => r.json()).then(data => {
  ARTICLES = data;
  setLang(currentLang);
  renderCards("all");
  const params = new URLSearchParams(location.search);
  if (params.get("article")) openArticle(params.get("article"));
});
</script>
