<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101014"/>
      <stop offset="50%" stop-color="#14141a"/>
      <stop offset="100%" stop-color="#0e0e12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0a830"/>
      <stop offset="100%" stop-color="#d49020"/>
    </linearGradient>
    <radialGradient id="glow1" cx="75%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#f0a830" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f0a830" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="25%" cy="75%" r="30%">
      <stop offset="0%" stop-color="#2dd4a8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#2dd4a8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Network graph dots -->
  <g opacity="0.06" fill="#f0a830">
    <circle cx="850" cy="150" r="4"/><circle cx="920" cy="180" r="3"/><circle cx="980" cy="140" r="5"/>
    <circle cx="1040" cy="200" r="3"/><circle cx="890" cy="250" r="4"/><circle cx="960" cy="280" r="3"/>
    <circle cx="1020" cy="260" r="4"/><circle cx="1080" cy="160" r="3"/><circle cx="870" cy="320" r="3"/>
  </g>
  <g opacity="0.04" stroke="#f0a830" stroke-width="0.5" fill="none">
    <line x1="850" y1="150" x2="920" y2="180"/><line x1="920" y1="180" x2="980" y2="140"/>
    <line x1="980" y1="140" x2="1040" y2="200"/><line x1="1040" y1="200" x2="1080" y2="160"/>
    <line x1="920" y1="180" x2="890" y2="250"/><line x1="890" y1="250" x2="960" y2="280"/>
    <line x1="960" y1="280" x2="1020" y2="260"/><line x1="1020" y1="260" x2="1040" y2="200"/>
    <line x1="890" y1="250" x2="870" y2="320"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)" opacity="0.8"/>

  <!-- Eyebrow -->
  <rect x="80" y="155" width="230" height="26" rx="3" fill="none" stroke="#f0a830" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="195" y="172" font-family="'JetBrains Mono', monospace, system-ui" font-size="10" font-weight="600" fill="#f0a830" text-anchor="middle" letter-spacing="2">LINKEDIN AUTOMATION</text>

  <!-- Headline -->
  <text x="80" y="245" font-family="'JetBrains Mono', monospace, system-ui" font-size="48" font-weight="700" fill="#f0a830" letter-spacing="-1">selected.ai</text>
  <text x="80" y="305" font-family="system-ui, sans-serif" font-size="36" font-weight="600" fill="#dcdce0" letter-spacing="-0.5">AI-Powered Lead</text>
  <text x="80" y="350" font-family="system-ui, sans-serif" font-size="36" font-weight="600" fill="#68687a" letter-spacing="-0.5">Automation.</text>

  <!-- Description -->
  <text x="80" y="400" font-family="system-ui, sans-serif" font-size="15" fill="#a0a0ae">
    <tspan x="80">Automated LinkedIn outreach with AI-crafted messages,</tspan>
    <tspan x="80" dy="22">smart lead discovery, and timezone-aware delivery.</tspan>
  </text>

  <!-- Feature pills -->
  <g font-family="system-ui, sans-serif" font-size="11.5" font-weight="500">
    <rect x="80" y="455" width="140" height="28" rx="4" fill="#f0a830" fill-opacity="0.1" stroke="#f0a830" stroke-opacity="0.25" stroke-width="0.8"/>
    <text x="150" y="473" fill="#f0a830" text-anchor="middle">Claude / Bedrock</text>

    <rect x="232" y="455" width="130" height="28" rx="4" fill="#2dd4a8" fill-opacity="0.1" stroke="#2dd4a8" stroke-opacity="0.25" stroke-width="0.8"/>
    <text x="297" y="473" fill="#2dd4a8" text-anchor="middle">Smart Timing</text>

    <rect x="374" y="455" width="130" height="28" rx="4" fill="#f0a830" fill-opacity="0.1" stroke="#f0a830" stroke-opacity="0.25" stroke-width="0.8"/>
    <text x="439" y="473" fill="#f0a830" text-anchor="middle">Lead Discovery</text>

    <rect x="516" y="455" width="140" height="28" rx="4" fill="#2dd4a8" fill-opacity="0.1" stroke="#2dd4a8" stroke-opacity="0.25" stroke-width="0.8"/>
    <text x="586" y="473" fill="#2dd4a8" text-anchor="middle">Real-time Dash</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="560" width="1200" height="70" fill="#0a0a0e" fill-opacity="0.6"/>
  <line x1="0" y1="560" x2="1200" y2="560" stroke="#2e2e38" stroke-width="0.5"/>
  <text x="80" y="600" font-family="'JetBrains Mono', monospace, system-ui" font-size="15" fill="#68687a" letter-spacing="0.5">selected.ai</text>

  <g font-family="system-ui, sans-serif" font-size="11" fill="#52525b" letter-spacing="0.5">
    <text x="700" y="600">Blog</text>
    <circle cx="735" cy="597" r="1.5" fill="#3a3a48"/>
    <text x="750" y="600">Pitch Deck</text>
  </g>

  <rect x="1010" y="585" width="110" height="24" rx="4" fill="#18181c" stroke="#2e2e38" stroke-width="0.5"/>
  <text x="1065" y="601" font-family="system-ui, sans-serif" font-size="9" fill="#52525b" text-anchor="middle" letter-spacing="1">GCP + AWS</text>
</svg>
