<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>aipromo — ops</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #101014; --bg2: #18181c; --surface: #1e1e24; --surface2: #26262e;
      --border: #2e2e38; --border2: #3a3a48;
      --text: #dcdce0; --text2: #a0a0ae; --text3: #68687a;
      --amber: #f0a830; --amber2: #d49020; --amber-dim: rgba(240,168,48,0.12);
      --teal: #2dd4a8; --teal-dim: rgba(45,212,168,0.10);
      --red: #f05050; --red-dim: rgba(240,80,80,0.12);
      --blue: #5090f0; --blue-dim: rgba(80,144,240,0.10);
      --green: #40c060;
      --font: 'DM Sans', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 13px; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }
    ::selection { background: var(--amber); color: var(--bg); }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ── LAYOUT ── */
    .shell { display: grid; grid-template-columns: 56px 1fr; grid-template-rows: 44px 1fr; height: 100vh; }
    .topbar {
      grid-column: 1 / -1; background: var(--bg2); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; gap: 16px; z-index: 10;
    }
    .topbar .logo { font-family: var(--mono); font-weight: 700; font-size: 14px; color: var(--amber); letter-spacing: -0.5px; }
    .topbar .sep { width: 1px; height: 20px; background: var(--border); }
    .topbar .crumb { font-size: 12px; color: var(--text3); font-weight: 500; }
    .topbar .crumb b { color: var(--text); }
    .topbar .right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .topbar .pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--teal); box-shadow: 0 0 6px var(--teal); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .topbar .clock { font-family: var(--mono); font-size: 11px; color: var(--text3); }

    .rail {
      background: var(--bg2); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center; padding: 8px 0; gap: 2px;
      overflow-y: auto;
    }
    .rail a {
      width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
      border-radius: 8px; color: var(--text3); text-decoration: none; position: relative;
      transition: all 0.15s;
    }
    .rail a:hover { color: var(--text); background: var(--surface); }
    .rail a.active { color: var(--amber); background: var(--amber-dim); }
    .rail a .dot {
      position: absolute; top: 6px; right: 6px; width: 6px; height: 6px;
      border-radius: 50%; background: var(--red);
    }
    .rail a svg { width: 20px; height: 20px; }
    .rail .spacer { flex: 1; }

    .viewport { overflow-y: auto; padding: 20px 24px 40px; }

    /* ── TYPOGRAPHY ── */
    .page-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .page-title .counter { font-family: var(--mono); font-size: 13px; color: var(--text3); font-weight: 400; }
    .section-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--text3); margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── STAT GRID ── */
    .kpi-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-bottom: 24px; }
    .kpi {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 14px 16px; position: relative; overflow: hidden;
    }
    .kpi .num { font-family: var(--mono); font-size: 26px; font-weight: 700; line-height: 1; }
    .kpi .lbl { font-size: 11px; color: var(--text3); margin-top: 4px; font-weight: 500; }
    .kpi.amber .num { color: var(--amber); }
    .kpi.teal .num { color: var(--teal); }
    .kpi.red .num { color: var(--red); }
    .kpi.blue .num { color: var(--blue); }
    .kpi { transition: transform 0.1s, border-color 0.1s; }
    .kpi[style*="cursor"]:hover { transform: translateY(-2px); border-color: var(--border2); }
    .kpi::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    }
    .kpi.amber::before { background: var(--amber); }
    .kpi.teal::before { background: var(--teal); }
    .kpi.red::before { background: var(--red); }
    .kpi.blue::before { background: var(--blue); }

    /* ── CARD ── */
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      margin-bottom: 16px; overflow: hidden;
    }
    .card-head {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 13px;
    }
    .card-head .badge {
      font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 4px;
      font-weight: 500;
    }
    .card-body { padding: 16px; }
    .card-body.flush { padding: 0; }

    /* ── TABLE ── */
    .tbl { width: 100%; border-collapse: collapse; }
    .tbl th {
      font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--text3); padding: 8px 12px; text-align: left;
      background: var(--surface2); border-bottom: 1px solid var(--border); position: sticky; top: 0;
    }
    .tbl td {
      padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 12px;
      vertical-align: top; max-width: 0;
    }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl tr:hover td { background: rgba(240,168,48,0.03); }
    .tbl .mono { font-family: var(--mono); font-size: 11px; }
    .tbl .trunc { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tbl .dim { color: var(--text3); }
    .tbl .msg-preview { max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text2); }

    /* ── TAGS & BADGES ── */
    .tag {
      display: inline-block; font-family: var(--mono); font-size: 10px; font-weight: 500;
      padding: 2px 7px; border-radius: 3px; background: var(--surface2); color: var(--text2);
      border: 1px solid var(--border);
    }
    .tag.amber { background: var(--amber-dim); color: var(--amber); border-color: transparent; }
    .tag.teal { background: var(--teal-dim); color: var(--teal); border-color: transparent; }
    .tag.red { background: var(--red-dim); color: var(--red); border-color: transparent; }
    .tag.blue { background: var(--blue-dim); color: var(--blue); border-color: transparent; }
    .status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; }
    .status-dot.green { background: var(--green); }
    .status-dot.red { background: var(--red); }
    .status-dot.amber { background: var(--amber); }
    .status-dot.gray { background: var(--text3); }

    /* ── BUTTONS ── */
    .btn {
      font-family: var(--font); font-size: 12px; font-weight: 500; padding: 6px 14px;
      border: 1px solid var(--border); border-radius: 6px; cursor: pointer;
      background: var(--surface2); color: var(--text); transition: all 0.12s;
    }
    .btn:hover { background: var(--border); border-color: var(--border2); }
    .btn.primary { background: var(--amber); color: var(--bg); border-color: var(--amber); }
    .btn.primary:hover { background: var(--amber2); }
    .btn.teal { background: var(--teal); color: var(--bg); border-color: var(--teal); }
    .btn.danger { background: var(--red-dim); color: var(--red); border-color: transparent; }
    .btn.sm { padding: 3px 9px; font-size: 11px; }
    .btn.ghost { background: transparent; border-color: transparent; color: var(--text3); }
    .btn.ghost:hover { color: var(--text); background: var(--surface2); }
    .btn-group { display: flex; gap: 6px; }

    /* ── FORMS ── */
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); margin-bottom: 5px; }
    input[type=text], input[type=number], input[type=search], select, textarea {
      width: 100%; font-family: var(--font); font-size: 12px; padding: 7px 10px;
      background: var(--bg2); border: 1px solid var(--border); border-radius: 5px;
      color: var(--text); outline: none; transition: border-color 0.12s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--amber); }
    textarea { min-height: 60px; resize: vertical; font-family: var(--font); }
    .input-row { display: flex; gap: 8px; align-items: end; }
    .input-row .field { margin-bottom: 0; flex: 1; }
    .check-label { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); cursor: pointer; }
    .check-label input { width: auto; }

    /* ── MESSAGES ── */
    .thread { max-height: 420px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    .bubble {
      max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 12px; line-height: 1.55;
      word-wrap: break-word; white-space: pre-wrap;
    }
    .bubble.out { align-self: flex-end; background: var(--amber-dim); color: var(--text); border-bottom-right-radius: 4px; }
    .bubble.in { align-self: flex-start; background: var(--surface2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .bubble .ts { font-family: var(--mono); font-size: 9px; color: var(--text3); margin-top: 4px; }
    .bubble .tp { font-family: var(--mono); font-size: 9px; color: var(--text3); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100;
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.15s;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      width: 560px; max-width: 90vw; max-height: 85vh; overflow-y: auto;
      animation: slideUp 0.2s;
    }
    .modal-head { padding: 16px 20px; border-bottom: 1px solid var(--border); font-weight: 600; display: flex; align-items: center; }
    .modal-head .close { margin-left: auto; cursor: pointer; color: var(--text3); font-size: 18px; background: none; border: none; }
    .modal-head .close:hover { color: var(--text); }
    .modal-body { padding: 20px; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* ── TOAST ── */
    .toast-area { position: fixed; bottom: 16px; right: 16px; z-index: 200; display: flex; flex-direction: column; gap: 6px; }
    .toast {
      font-size: 12px; padding: 10px 16px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); animation: slideUp 0.2s;
      display: flex; align-items: center; gap: 8px;
    }
    .toast.ok { border-left: 3px solid var(--teal); }
    .toast.err { border-left: 3px solid var(--red); }

    /* ── UTILITY ── */
    .flex { display: flex; align-items: center; gap: 8px; }
    .flex-between { display: flex; align-items: center; justify-content: space-between; }
    .gap-16 { gap: 16px; }
    .mb-16 { margin-bottom: 16px; }
    .mb-8 { margin-bottom: 8px; }
    .mt-16 { margin-top: 16px; }
    .hidden { display: none !important; }
    .grow { flex: 1; }
    .text-right { text-align: right; }
    .nowrap { white-space: nowrap; }

    /* ── PAGE TABS ── */
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
    .tabs .tab {
      padding: 8px 16px; font-size: 12px; font-weight: 500; color: var(--text3); cursor: pointer;
      border-bottom: 2px solid transparent; transition: all 0.12s;
    }
    .tabs .tab:hover { color: var(--text); }
    .tabs .tab.active { color: var(--amber); border-bottom-color: var(--amber); }
    .msg-filter-btn.active { background: var(--amber); color: var(--bg); border-color: var(--amber); }

    /* Conversation list items */
    .conv-item { padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; border-left: 3px solid transparent; }
    .conv-item:hover { background: var(--surface2); }
    .conv-item.conv-active { background: var(--surface2); border-left-color: var(--amber); }
  </style>
</head>
<body>

<div class="shell">
  <!-- TOP BAR -->
  <header class="topbar">
    <span class="logo">aipromo</span>
    <span class="sep"></span>
    <span class="crumb" id="crumb">Dashboard</span>
    <div class="right">
      <span class="pulse"></span>
      <span class="clock" id="clock"></span>
    </div>
  </header>

  <!-- ICON RAIL -->
  <nav class="rail" id="rail">
    <a href="/dashboard" data-p="dashboard" title="Dashboard" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    </a>
    <a href="/leads" data-p="leads" title="Leads">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
    </a>
    <a href="/conversations" data-p="conversations" title="Conversations" id="nav-conv">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    </a>
    <a href="/messages" data-p="messages" title="All Messages">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
    </a>
    <a href="/outreach" data-p="outreach" title="Outreach Queue">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
    </a>
    <a href="/campaigns" data-p="campaigns" title="Campaigns">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    </a>
    <a href="/posts" data-p="posts" title="Posts">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    </a>
    <a href="/search" data-p="search" title="Search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </a>
    <a href="/pipeline" data-p="pipeline" title="Pipeline">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
    </a>
    <a href="/analytics" data-p="analytics" title="Analytics">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    </a>
    <a href="/deals" data-p="deals" title="Deals">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
    </a>
    <span class="spacer"></span>
    <a href="/follow-ups" data-p="follow-ups" title="Follow-ups">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    </a>
    <a href="/sync" data-p="sync" title="Sync">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
    </a>
    <a href="/activity" data-p="activity" title="Activity Log">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    </a>
  </nav>

  <!-- MAIN VIEWPORT -->
  <main class="viewport" id="vp"></main>
</div>

<div class="toast-area" id="toasts"></div>

<script>
const A='/api';
const PAGES=['dashboard','leads','conversations','messages','outreach','campaigns','posts','search','sync','activity','analytics','pipeline','deals','follow-ups'];
function pageFromPath(){const p=window.location.pathname.replace(/^\//,'');return PAGES.includes(p)?p:'dashboard';}
let page=pageFromPath();

/* ── WebSocket ── */
let ws=null;
let _wsPaused=false; // pause WS refresh during own sends
function connectWS(){
  const proto=location.protocol==='https:'?'wss:':'ws:';
  const key=localStorage.getItem('apiKey')||'';
  ws=new WebSocket(`${proto}//${location.host}/ws?key=${encodeURIComponent(key)}`);
  ws.onopen=()=>console.log('WS connected');
  ws.onclose=()=>{console.log('WS disconnected, reconnecting...');setTimeout(connectWS,3000);};
  ws.onerror=()=>ws.close();
  ws.onmessage=(e)=>{
    if(_wsPaused)return;
    try{
      const msg=JSON.parse(e.data);
      handleWSEvent(msg);
    }catch{}
  };
}
function handleWSEvent(msg){
  const ev=msg.event;
  if(ev==='message'&&!msg.isSender){
    const dot=$('nav-conv');
    if(dot&&!dot.querySelector('.dot'))dot.insertAdjacentHTML('beforeend','<span class="dot"></span>');
    toast(`New message${msg.senderName?' from '+msg.senderName:''}`,true);
    // Only refresh for INCOMING messages
    if(page==='conversations')loadConv(false,true);
    if(page==='messages')loadMsgs(window._lastMsgFilter||'');
    if(page==='dashboard')pgDash(vp());
    if(window._activeChat===msg.chatId)openThread(msg.chatId,'');
  }
  if(ev==='relation'){
    if(page==='leads')loadLeads();
    if(page==='dashboard')pgDash(vp());
  }
  if(ev==='sync'){
    if(page==='dashboard')pgDash(vp());
    toast('Sync complete',true);
  }
}
connectWS();

/* ── HELPERS ── */
async function api(p,o){
  const key=localStorage.getItem('apiKey')||'';
  const r=await fetch(A+p,{
    headers:{'Content-Type':'application/json','X-API-Key':key},
    ...o,body:o?.body?JSON.stringify(o.body):undefined
  });
  if(r.status===401){
    const k=prompt('Enter API key:');
    if(k){localStorage.setItem('apiKey',k);return api(p,o);}
    return {error:'Unauthorized'};
  }
  return r.json();
}
const $=id=>document.getElementById(id);
const vp=()=>$('vp');
function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function fmtDate(d){if(!d)return '—';return new Date(d).toLocaleDateString('uk-UA',{day:'2-digit',month:'short',year:'numeric'});}
function fmtTime(d){if(!d)return '';return new Date(d).toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit'});}
function fmtFull(d){if(!d)return '—';return fmtDate(d)+' '+fmtTime(d);}
function ago(d){if(!d)return '';const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return s+'s';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d';}
function toast(msg,ok=true){
  const t=document.createElement('div');t.className='toast '+(ok?'ok':'err');t.textContent=msg;
  $('toasts').appendChild(t);setTimeout(()=>t.remove(),4000);
}
function modal(title,html){
  const o=document.createElement('div');o.className='modal-overlay';
  o.innerHTML=`<div class="modal"><div class="modal-head">${title}<button class="close" onclick="this.closest('.modal-overlay').remove()">&times;</button></div><div class="modal-body">${html}</div></div>`;
  o.addEventListener('click',e=>{if(e.target===o)o.remove();});
  document.body.appendChild(o);return o;
}

/* ── CLOCK ── */
setInterval(()=>{$('clock').textContent=new Date().toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit',second:'2-digit'});},1000);

/* ── NAV ── */
document.querySelectorAll('.rail a[data-p]').forEach(a=>{
  a.addEventListener('click',e=>{e.preventDefault();navigate(a.dataset.p);});
});
function navigate(p, pushState=true){
  page=p;
  if(pushState) history.pushState(null,'','/'+p);
  document.querySelectorAll('.rail a').forEach(x=>x.classList.remove('active'));
  document.querySelector(`.rail a[data-p="${p}"]`)?.classList.add('active');

    const isActive=window._activeChat===c.chat_id;
    return `<div class="conv-item${isActive?' conv-active':''}${unr?' conv-unread':''}" data-chat="${c.chat_id}" onclick="selectConv('${c.chat_id}','${esc(c.attendee_name||c.lead_name||c.subject||'')}','${c.account_id||''}')">

}
async function aiDraft(chatId){
  $('reply-box').value='Generating...';
  const acc=$('reply-account')?.value||'ihor';
  const r=await api(`/conversations/${chatId}/ai-reply`,{method:'POST',body:{account:acc}});
  $('reply-box').value=r.draft||r.error||'';
}
let _sending=false;
async function sendReply(chatId,name){
  if(_sending)return;
  const t=$('reply-box').value;if(!t)return;
  const acc=$('reply-account')?.value||'ihor';
  _sending=true;
  _wsPaused=true;
  const btn=document.querySelector('[onclick*="sendReply"]');
  if(btn){btn.disabled=true;btn.textContent='Sending...';}
  try{
    const r=await api(`/conversations/${chatId}/reply`,{method:'POST',body:{text:t,account:acc}});
    if(r.ok){
      toast('Sent');
      $('reply-box').value='';
      await openThread(chatId,name);
    }else{toast(r.error,false);}
  }finally{
    _sending=false;
    setTimeout(()=>{_wsPaused=false;},2000); // resume WS after 2s
    if(btn){btn.disabled=false;btn.textContent='Send';}
  }
}

function setMsgFilter(btn,f){
  document.querySelectorAll('.msg-filter-btn').forEach(b=>{b.classList.remove('primary');b.classList.remove('active');});
  btn.classList.add('primary');btn.classList.add('active');
  loadMsgs(f);
}
async function loadMsgs(filter){
  window._lastMsgFilter=filter;
  const d=await api('/messages?limit=500&'+filter);
  // Group by chat_id
  const threads=new Map();
  for(const m of d.items){
    const key=m.chat_id||m.message_id;
    if(!threads.has(key))threads.set(key,{contact:m.contact_name||'Chat',sender:m.sender_name,msgs:[]});
    threads.get(key).msgs.push(m);
  }
  // Sort threads by latest message
  const sorted=[...threads.entries()].sort((a,b)=>{
    const ta=a[1].msgs[0]?.timestamp||'';const tb=b[1].msgs[0]?.timestamp||'';
    return tb.localeCompare(ta);
  });
  // Each thread: msgs are DESC from API, reverse for display
  $('msgs-tbl').innerHTML=`
    <div style="font-size:11px;color:var(--text3);margin-bottom:12px">${d.items.length} messages in ${sorted.length} threads</div>
    ${sorted.map(([chatId,t])=>{
      const msgs=t.msgs.slice().reverse(); // oldest first
      const first=msgs[0];
      const last=msgs[msgs.length-1];
      const expanded=msgs.length<=3;
      return `
      <div class="card mb-8">
        <div class="card-head" style="cursor:pointer" onclick="toggleThread(this)">
          <span class="tag ${first.is_sender?'amber':'teal'}">${first.is_sender?(t.sender||'OUT'):'IN'}</span>
          <strong>${esc(t.contact)}</strong>
          <span style="color:var(--text3);font-size:11px;margin-left:4px">${msgs.length} msg${msgs.length>1?'s':''}</span>
          <span class="badge" style="background:var(--surface2);margin-left:auto">${first.message_type||''}</span>
          <span class="mono dim" style="font-size:10px;margin-left:8px">${ago(last.timestamp)}</span>
          <span class="thread-chevron" style="margin-left:8px;color:var(--text3);font-size:10px">${expanded?'▼':'▶'}</span>
        </div>
        <div class="thread-body" style="${expanded?'':'display:none'}">
          ${msgs.map((m,i)=>`
            <div style="padding:8px 16px;border-top:1px solid var(--border);${i===0?'border-top:none':''}">
              <div class="flex-between" style="margin-bottom:4px">
                <span style="font-size:11px;font-weight:600;${m.is_sender?'color:var(--amber)':'color:var(--teal)'}">
                  ${m.is_sender?(m.sender_name||'You'):esc(t.contact)}
                </span>
                <span class="mono dim" style="font-size:10px">${fmtFull(m.timestamp)}</span>
              </div>
              <div style="font-size:12px;line-height:1.55;color:var(--text2);white-space:pre-wrap;max-height:${i===0?'none':'120px'};overflow:hidden">${esc(m.text)}</div>
              ${m.text?.length>300&&i>0?'<div style="font-size:10px;color:var(--text3);cursor:pointer;margin-top:4px" onclick="this.previousElementSibling.style.maxHeight=this.previousElementSibling.style.maxHeight===\'none\'?\'120px\':\'none\'">[show more]</div>':''}
            </div>
          `).join('')}
        </div>
      </div>`;
    }).join('')}`;
}
function toggleThread(head){
  const body=head.nextElementSibling;
  const chev=head.querySelector('.thread-chevron');
  if(body.style.display==='none'){body.style.display='';chev.textContent='▼';}
  else{body.style.display='none';chev.textContent='▶';}
}

  const leadId=prompt('Lead ID:');if(!leadId)return;
  const title=prompt('Deal title:');if(!title)return;
  const value=prompt('Value (UAH):','4999');
  api('/deals',{method:'POST',body:{lead_id:parseInt(leadId),title,value:parseFloat(value||'0')}}).then(()=>{toast('Deal created');pgDeals(vp());});
}

/* ═══════════════ FOLLOW-UPS ═══════════════ */
async function pgFollowUps(el){
  const [pending,sent]=await Promise.all([api('/follow-ups?status=pending'),api('/follow-ups?status=sent')]);
  el.innerHTML=`
    <div class="page-title">Follow-ups</div>
    <div class="section-label">Pending (${pending.items.length})</div>
    <div class="card mb-16"><div class="card-body flush" style="max-height:40vh;overflow:auto">
      <table class="tbl"><thead><tr><th>Lead</th><th>Step</th><th>Scheduled</th><th></th></tr></thead><tbody>
      ${pending.items.map(f=>`<tr>
        <td><strong>${esc(f.lead_name||'—')}</strong><br><span class="dim" style="font-size:10px">${esc(f.lead_headline||'')}</span></td>
        <td class="mono">#${f.step}</td>
        <td class="mono dim">${fmtFull(f.scheduled_for)}</td>
        <td><button class="btn sm danger" onclick="cancelFollowUp(${f.id})">Cancel</button></td>
      </tr>`).join('')}
      </tbody></table>
    </div></div>
    <div class="section-label">Sent (${sent.items.length})</div>
    <div class="card"><div class="card-body flush" style="max-height:40vh;overflow:auto">
      <table class="tbl"><thead><tr><th>Lead</th><th>Step</th><th>Sent</th><th>Message</th></tr></thead><tbody>
      ${sent.items.map(f=>`<tr>
        <td><strong>${esc(f.lead_name||'—')}</strong></td>
        <td class="mono">#${f.step}</td>
        <td class="mono dim">${fmtFull(f.sent_at)}</td>
        <td class="trunc dim">${esc((f.message_text||'').slice(0,100))}</td>
      </tr>`).join('')}
      </tbody></table>
    </div></div>`;
}
async function cancelFollowUp(id){
  await api('/follow-ups/'+id,{method:'PATCH',body:{status:'cancelled'}});
  toast('Follow-up cancelled');pgFollowUps(vp());
}

/* ── INIT ── */
document.querySelectorAll('.rail a').forEach(x=>x.classList.remove('active'));
document.querySelector(`.rail a[data-p="${page}"]`)?.classList.add('active');
$('crumb').innerHTML='<b>'+page.charAt(0).toUpperCase()+page.slice(1)+'</b>';
render();
</script>
</body>
</html>
